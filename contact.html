<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Rose Pappalardo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Base ── */
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      color: #1a1a1a;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 50px 20px 0;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #1a1a1a;
    }

    header h1 a {
      text-decoration: none;
      color: inherit;
      transition: opacity 0.3s;
    }

    header h1 a:hover { opacity: 0.6; }

    /* ── Navigation ── */
    nav {
      margin-top: 24px;
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      color: #1a1a1a;
      position: relative;
      padding-bottom: 3px;
      transition: color 0.3s ease;
    }

    nav a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 1px;
      background: #1a1a1a;
      transition: width 0.35s ease;
    }

    nav a:hover { color: #555; }
    nav a:hover::after { width: 100%; }
    nav a.active::after { width: 100%; }

    /* ── Divider ── */
    .divider {
      width: 60px;
      height: 1px;
      background: #ccc;
      margin: 30px auto 0;
    }

    /* ── Contact Section ── */
    .contact {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 80px 30px;
      max-width: 600px;
      margin: 0 auto;
    }

    .contact h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2.2rem;
      letter-spacing: 0.06em;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .contact .intro {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 1.15rem;
      color: #777;
      line-height: 1.7;
      margin-bottom: 48px;
      letter-spacing: 0.02em;
    }

    /* ── Contact Items ── */
    .contact-item {
      margin-bottom: 36px;
    }

    .contact-item .label {
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 10px;
    }

    .contact-item a {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 1.3rem;
      color: #1a1a1a;
      text-decoration: none;
      letter-spacing: 0.03em;
      position: relative;
      transition: color 0.3s;
    }

    .contact-item a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 1px;
      background: #1a1a1a;
      transition: width 0.35s ease;
    }

    .contact-item a:hover {
      color: #555;
    }

    .contact-item a:hover::after {
      width: 100%;
    }

    /* ── Instagram icon ── */
    .insta-icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      vertical-align: -2px;
      margin-right: 6px;
      opacity: 0.6;
    }

    /* ── Accent line ── */
    .accent-line {
      width: 40px;
      height: 1px;
      background: #ccc;
      margin: 12px auto 48px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px 20px 50px;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: #aaa;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      header h1 { font-size: 1.8rem; }
      nav { gap: 20px; }
      .contact h2 { font-size: 1.8rem; }
      .contact { padding: 50px 20px; }
      .contact-item a { font-size: 1.15rem; }
    }

    /* ── Fade-in ── */
    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.9s ease forwards;
    }

    .fade-in-delay-1 { animation-delay: 0.15s; }
    .fade-in-delay-2 { animation-delay: 0.3s; }
    .fade-in-delay-3 { animation-delay: 0.45s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <h1><a href="index.html">Rose Pappalardo</a></h1>
    <nav>
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <div class="divider"></div>
  </header>

  <!-- ── Contact ── -->
  <section class="contact">
    <h2 class="fade-in">Get in Touch</h2>
    <p class="intro fade-in fade-in-delay-1">For inquiries about available work, commissions,<br>or just to say hello.</p>

    <div class="accent-line fade-in fade-in-delay-1"></div>

    <div class="contact-item fade-in fade-in-delay-2">
      <p class="label">Email</p>
      <a href="mailto:rosepappalardoart@gmail.com">rosepappalardoart@gmail.com</a>
    </div>

    <div class="contact-item fade-in fade-in-delay-3">
      <p class="label">Instagram</p>
      <a href="https://instagram.com/rosepappalardoart" target="_blank" rel="noopener">
        <svg class="insta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/></svg>@rosepappalardoart
      </a>
    </div>
  </section>

  <!-- ── Footer ── -->
  <footer>
    &copy; 2026 Rose Pappalardo. All rights reserved.
  </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rose Pappalardo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Base ── */
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Lato', sans-serif;
      font-weight: 300;
    }

    /* ── Slideshow Background ── */
    .slideshow {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .slideshow .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.6s ease-in-out;
    }

    .slideshow .slide.active {
      opacity: 1;
    }

    /* Subtle dark overlay so text is always readable */
    .slideshow::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.30);
      z-index: 1;
    }

    /* ── Content Overlay ── */
    .overlay {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
    }

    .overlay h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 4.5rem;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      text-shadow: 0 2px 30px rgba(0,0,0,0.35);
    }

    .overlay .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 1.25rem;
      letter-spacing: 0.10em;
      color: rgba(255,255,255,0.85);
      margin-top: 8px;
      text-shadow: 0 1px 15px rgba(0,0,0,0.3);
    }

    /* ── Divider ── */
    .divider {
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,0.5);
      margin: 32px auto;
    }

    /* ── Navigation ── */
    nav {
      display: flex;
      gap: 44px;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      font-size: 0.95rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
      position: relative;
      padding-bottom: 3px;
      transition: color 0.3s ease;
      text-shadow: 0 1px 10px rgba(0,0,0,0.3);
    }

    nav a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 1px;
      background: #fff;
      transition: width 0.35s ease;
    }

    nav a:hover {
      color: rgba(255,255,255,0.8);
    }

    nav a:hover::after {
      width: 100%;
    }

    /* ── Slide Indicators ── */
    .indicators {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      gap: 12px;
    }

    .indicators button {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.7);
      background: transparent;
      cursor: pointer;
      transition: background 0.3s ease, border-color 0.3s ease;
      padding: 0;
    }

    .indicators button.active {
      background: #fff;
      border-color: #fff;
    }

    .indicators button:hover {
      background: rgba(255,255,255,0.5);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .overlay h1 {
        font-size: 2.8rem;
        letter-spacing: 0.14em;
      }
      .overlay .subtitle {
        font-size: 1.05rem;
      }
      nav {
        gap: 26px;
      }
      nav a {
        font-size: 0.85rem;
      }
    }

    @media (max-width: 480px) {
      .overlay h1 {
        font-size: 2rem;
        letter-spacing: 0.10em;
      }
      nav {
        gap: 20px;
      }
      nav a {
        font-size: 0.8rem;
        letter-spacing: 0.12em;
      }
    }

    /* ── Fade-in entrance ── */
    .fade-in {
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 1s ease forwards;
    }

    .fade-in-delay-1 { animation-delay: 0.2s; }
    .fade-in-delay-2 { animation-delay: 0.5s; }
    .fade-in-delay-3 { animation-delay: 0.8s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <!-- ── Full-screen Slideshow ── -->
  <div class="slideshow" id="slideshow">
    <div class="slide active" style="background-image: url('images/IMG_6803.jpeg');"></div>
    <div class="slide" style="background-image: url('images/Garden in Motion.jpeg');"></div>
    <div class="slide" style="background-image: url('images/Fluffy and Fun.jpeg');"></div>
    <div class="slide" style="background-image: url('images/The Tender Memory.jpeg');"></div>
  </div>

  <!-- ── Overlay Content ── -->
  <div class="overlay">
    <h1 class="fade-in">Rose Pappalardo</h1>
    <p class="subtitle fade-in fade-in-delay-1">Artist</p>

    <div class="divider fade-in fade-in-delay-2"></div>

    <nav class="fade-in fade-in-delay-3">
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>

  <!-- ── Slide Indicators ── -->
  <div class="indicators" id="indicators">
    <button class="active" onclick="goToSlide(0)"></button>
    <button onclick="goToSlide(1)"></button>
    <button onclick="goToSlide(2)"></button>
    <button onclick="goToSlide(3)"></button>
  </div>

  <!-- ── Script ── -->
  <script>
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.indicators button');
    let current = 0;
    let interval;

    function goToSlide(index) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = index;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
      resetTimer();
    }

    function nextSlide() {
      goToSlide((current + 1) % slides.length);
    }

    function resetTimer() {
      clearInterval(interval);
      interval = setInterval(nextSlide, 5000);
    }

    // Start auto-advance every 5 seconds
    resetTimer();
  </script>

</body>
</html>
